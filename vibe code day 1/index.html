<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>Student Profile Card</title>
        <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
        <style>
            :root{
                --card-width:380px;
                --accent-1:#6a11cb;
                --accent-2:#2575fc;
                --glass: rgba(255,255,255,0.7);
                --muted:#6b7280;
                --radius:18px;
                --glass-border: rgba(255,255,255,0.6);
            }
            html,body{height:100%;}
            body{
                margin:0;
                font-family: 'Poppins', system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial;
                display:flex;
                align-items:center;
                justify-content:center;
                /* vibrant animated gradient background */
                background: linear-gradient(120deg, #071030 0%, #1e3a8a 25%, #6a11cb 50%, #2575fc 75%, #e0f2fe 100%);
                background-size: 200% 200%;
                animation: gradientShift 12s ease infinite;
                padding:32px;
                perspective: 1200px;
            }

            @keyframes gradientShift{
                0%{ background-position:0% 50%; }
                50%{ background-position:100% 50%; }
                100%{ background-position:0% 50%; }
            }

            /* Card container */
            .profile-card{
                width:var(--card-width);
                background: linear-gradient(135deg, rgba(255,255,255,0.95), rgba(245,250,255,0.90));
                border-radius:var(--radius);
                box-shadow: 
                    0 20px 60px rgba(20,40,80,0.15),
                    0 0 1px rgba(255,255,255,0.5) inset,
                    0 0 0 1px rgba(37,117,252,0.08);
                padding:24px;
                box-sizing:border-box;
                overflow:hidden;
                position:relative;
                backdrop-filter: blur(20px) saturate(180%);
                border:1px solid rgba(255,255,255,0.8);
                transition: transform 0.8s cubic-bezier(0.68, -0.55, 0.265, 1.55);
                transform-style: preserve-3d;
            }

            .profile-card:hover{
                transform: rotateY(12deg) rotateX(-8deg) scale(1.02);
            }

            .profile-card::before{
                content:'';
                position:absolute;
                top:0;
                left:0;
                right:0;
                height:1px;
                background: linear-gradient(90deg, transparent, rgba(255,255,255,0.8), transparent);
            }

            /* top cover image */
            .cover{
                height:96px;
                width:100%;
                border-radius:14px;
                overflow:hidden;
                position:relative;
                margin:-18px -18px 12px -18px;
                box-shadow: inset 0 0 60px rgba(255,255,255,0.06);
            }
            .cover img{
                width:100%;
                height:100%;
                object-fit:cover;
                display:block;
                transform:scale(1.05);
                transition:transform .6s ease;
                filter:contrast(1.05) saturate(1.05);
            }
            .profile-card:hover .cover img{ transform:scale(1.08) }

            .header{
                display:flex;
                align-items:center;
                gap:14px;
            }

            .avatar{
                width:84px;
                height:84px;
                border-radius:50%;
                background:linear-gradient(135deg,var(--accent-1),var(--accent-2));
                display:flex;
                align-items:center;
                justify-content:center;
                color:white;
                font-weight:700;
                font-size:20px;
                flex-shrink:0;
                box-shadow: 
                    0 12px 30px rgba(37,117,252,0.25),
                    inset -2px -2px 6px rgba(0,0,0,0.1),
                    inset 2px 2px 6px rgba(255,255,255,0.3);
                overflow:hidden;
                position:relative;
                border:1px solid rgba(255,255,255,0.3);
            }
            .avatar img{ width:100%; height:100%; object-fit:cover; display:block; }

            .name{
                margin:0;
                font-size:20px;
                background: linear-gradient(90deg, #a855f7 0%, #ec4899 50%, #f97316 100%);
                -webkit-background-clip: text;
                -webkit-text-fill-color: transparent;
                background-clip: text;
                letter-spacing:0.2px;
                font-weight:700;
            }

            .stream{
                margin:6px 0 0 0;
                font-size:13px;
                color:var(--muted);
            }

            .bio{
                margin-top:12px;
                font-size:14px;
                color:#334155;
                line-height:1.45;
            }

            .meta{
                margin-top:14px;
                display:flex;
                flex-wrap:wrap;
                gap:10px;
                align-items:center;
            }

            .pill{
                padding:8px 12px;
                background: linear-gradient(90deg, rgba(106,17,203,0.10), rgba(37,117,252,0.06));
                border-radius:999px;
                font-size:13px;
                color:#0f1724;
                display:inline-flex;
                align-items:center;
                gap:8px;
            }

            .tags{
                display:flex;
                gap:8px;
                flex-wrap:wrap;
            }
            .tag{
                background: linear-gradient(180deg, rgba(255,255,255,0.9), rgba(245,249,255,0.9));
                border:1px solid rgba(37,117,252,0.08);
                color:#0f1724;
                padding:6px 10px;
                border-radius:10px;
                font-size:12px;
                box-shadow: 0 4px 12px rgba(16,24,40,0.03);
            }

            .actions{
                margin-top:14px;
                display:flex;
                gap:10px;
                align-items:center;
                justify-content:space-between;
            }

            .btn{
                padding:10px 14px;
                border-radius:10px;
                font-weight:600;
                font-size:13px;
                border:none;
                cursor:pointer;
                display:inline-flex;
                align-items:center;
                gap:8px;
            }
            .btn-primary{
                background: linear-gradient(135deg,var(--accent-1),var(--accent-2));
                color:white;
                box-shadow: 0 12px 30px rgba(37,117,252,0.20);
                transition: all 0.3s ease;
            }
            .btn-primary:hover{
                transform: translateY(-2px);
                box-shadow: 0 16px 40px rgba(37,117,252,0.28);
            }
            .btn-ghost{
                background: rgba(255,255,255,0.7);
                border:1.5px solid rgba(37,117,252,0.15);
                color:var(--accent-2);
                transition: all 0.3s ease;
                backdrop-filter: blur(10px);
            }
            .btn-ghost:hover{
                background: rgba(37,117,252,0.08);
                border-color: rgba(37,117,252,0.25);
                transform: translateY(-2px);
            }

            .social a{
                display:inline-grid;
                place-items:center;
                width:36px;
                height:36px;
                border-radius:8px;
                color:var(--muted);
                text-decoration:none;
                transition: all 0.3s ease;
            }
            .social a:hover{ 
                background:rgba(37,117,252,0.10);
                color:var(--accent-2);
                transform: scale(1.1);
            }

            .footer-note{
                margin-top:12px;
                font-size:12px;
                color:var(--muted);
                text-align:center;
            }

            /* Responsive */
            @media (max-width:420px){
                .profile-card{width:92%;padding:14px}
                .avatar{width:64px;height:64px;border-radius:12px}
            }
        </style>
    </head>
    <body>

            <div class="meta">

                    </button>

        </main>
    </body>
</html>
